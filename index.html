<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI ANTOOR'S UNIQUE FASHION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">SPI ANTOOR</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Buy</a>
            <a href="#">Sell</a>
        </div>
        <div class="auth-buttons">
            <button id="loginBtn" onclick="openModal('loginModal')">Login</button>
            <button id="signupBtn" onclick="openModal('signupModal')">Signup</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-content">
            <div class="subtitle">CLOTHING & FASHION</div>
            <h1>WELCOME TO<br>SPI ANTOOR'S<br>UNIQUE FASHION</h1>
            <p>Premium fashion from Rangpur.<br>Quality you can trust.</p>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h3>Login</h3>
            <form onsubmit="event.preventDefault(); alert('Login feature will be connected to database soon!');">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('signupModal')">&times;</span>
            <h3>Signup / Register</h3>
            <form onsubmit="event.preventDefault(); alert('Registration feature will be connected to database soon!');">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
