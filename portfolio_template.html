<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white}
header{position:fixed;width:100%;top:0;background:rgba(15,23,42,.9);padding:15px 10%;display:flex;justify-content:space-between}
nav a{color:white;text-decoration:none;margin-left:20px}
section{min-height:100vh;padding:100px 10%;display:flex;align-items:center}
.hero-text h1{font-size:3rem}
.hero-text span{color:#38bdf8}
.btn{display:inline-block;margin-top:20px;padding:12px 25px;background:#38bdf8;color:black;text-decoration:none;border-radius:8px}
.card-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.card{background:#1e293b;padding:20px;border-radius:15px}
input,textarea{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px}
button{padding:12px 25px;border:none;background:#38bdf8;border-radius:8px}
</style>
</head>
<body>
<header>
<h2>Portfolio</h2>
<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section id="home">
<div class="hero-text">
<h1>Hi, I'm <span>Your Name</span></h1>
<p>Frontend Developer & Web Designer</p>
<a href="#projects" class="btn">View Projects</a>
</div>
</section>

<section id="about"><div><h2>About Me</h2><p>I create responsive websites.</p></div></section>

<section id="projects">
<div>
<h2>Projects</h2>
<div class="card-container">
<div class="card"><h3>Portfolio Website</h3></div>
<div class="card"><h3>E-Commerce UI</h3></div>
<div class="card"><h3>Blog Website</h3></div>
</div>
</div>
</section>

<section id="contact">
<div style="max-width:500px;width:100%">
<h2>Contact Me</h2>
<input placeholder="Name">
<input placeholder="Email">
<textarea rows="5" placeholder="Message"></textarea>
<button>Send</button>
</div>
</section>
</body>
</html>
